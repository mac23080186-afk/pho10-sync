<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phở 10 Sync – Chọn vai trò</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D62828">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Phở 10">
  <link rel="apple-touch-icon" href="/assets/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:         '#D62828',
            'brand-dark':  '#B71C1C',
            'kitchen-bg':  '#0F172A',
            'kitchen-card':'#1E293B',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-red-800 via-red-700 to-red-900 flex items-center justify-center p-4">

  <main class="w-full max-w-md">

    <!-- Logo / Branding -->
    <header class="text-center mb-10">
      <div class="text-white text-6xl mb-4">
        <i class="fa-solid fa-bowl-hot"></i>
      </div>
      <h1 class="text-white text-5xl font-black tracking-tight">Phở 10</h1>
    </header>

    <!-- Role Selection -->
    <section aria-label="Chọn vai trò">
      <p class="text-red-300 text-center text-sm uppercase tracking-widest mb-5 font-medium">
        Bạn là ai?
      </p>

      <div class="flex flex-col gap-4">

        <!-- Customer -->
        <a href="customer.html?table=1" id="btn-customer"
           class="role-card bg-white rounded-2xl shadow-2xl p-6 flex items-center gap-5
                  hover:scale-[1.02] active:scale-95 transition-transform duration-150">
          <div class="w-16 h-16 rounded-2xl bg-red-50 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-user text-brand text-2xl"></i>
          </div>
          <div class="flex-1">
            <p class="text-gray-900 font-bold text-xl leading-tight">Khách hàng</p>
            <p class="text-gray-500 text-sm mt-0.5">Đặt món &amp; theo dõi đơn hàng</p>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-lg"></i>
        </a>

        <!-- Kitchen / Manager -->
        <a href="kitchen.html" id="btn-kitchen"
           class="role-card bg-kitchen-card rounded-2xl shadow-2xl p-6 flex items-center gap-5
                  hover:scale-[1.02] active:scale-95 transition-transform duration-150
                  border border-slate-700">
          <div class="w-16 h-16 rounded-2xl bg-slate-700 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-utensils text-blue-400 text-2xl"></i>
          </div>
          <div class="flex-1">
            <p class="text-white font-bold text-xl leading-tight">Bếp / Quản lý</p>
            <p class="text-slate-400 text-sm mt-0.5">Bảng điều khiển vận hành bếp</p>
          </div>
          <i class="fa-solid fa-chevron-right text-slate-600 text-lg"></i>
        </a>

      </div>
    </section>

    <!-- PWA Install — always visible, handles all devices on click -->
    <div class="mt-6">
      <button id="btn-install"
              class="w-full flex items-center justify-center gap-2.5
                     bg-white/15 hover:bg-white/25 active:scale-95
                     text-white font-semibold py-3.5 rounded-2xl
                     border border-white/30 transition-all duration-150">
        <i class="fa-solid fa-download"></i>
        <span id="btn-install-label">Tải về điện thoại</span>
      </button>
      <!-- Instruction hint — shown below button after click -->
      <div id="install-hint" class="hidden mt-3 bg-white/15 border border-white/30 rounded-2xl px-4 py-3 text-center">
        <p id="install-hint-text" class="text-red-200 text-xs leading-relaxed"></p>
      </div>
    </div>

    <footer class="text-center mt-8">
      <p class="text-red-400 text-xs">Digital Transformation · Final Group 5</p>
    </footer>

  </main>

  <script src="js/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    }
  </script>
  <script>
  (function () {
    var btnEl   = document.getElementById('btn-install');
    var labelEl = document.getElementById('btn-install-label');
    var hintEl  = document.getElementById('install-hint');
    var hintTxt = document.getElementById('install-hint-text');

    var deferredPrompt = null;
    var isIOS       = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches;

    if (isStandalone) {
      labelEl.textContent = 'Đã cài đặt trên thiết bị này';
    }

    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;
    });

    btnEl.addEventListener('click', function () {
      if (isStandalone) {
        showHint('Đã cài đặt rồi, mở từ màn hình chính để dùng nhé!');
        return;
      }
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function () { deferredPrompt = null; });
        return;
      }
      if (isIOS) {
        hintTxt.innerHTML =
          'Nhấn biểu tượng <i class="fa-solid fa-arrow-up-from-bracket mx-1"></i>' +
          ' rồi chọn <strong>""Thêm vào màn hình chính""</strong>';
        hintEl.classList.remove('hidden');
        return;
      }
      showHint('Mở menu trình duyệt (dấu 3 chấm) → "Cài đặt ứng dụng" hoặc "Thêm vào màn hình chính".');
    });

    window.addEventListener('appinstalled', function () {
      labelEl.textContent = 'Đã cài đặt thành công!';
      hintEl.classList.add('hidden');
    });

    function showHint(msg) {
      hintTxt.textContent = msg;
      hintEl.classList.remove('hidden');
    }
  })();
  </script>
</body>
</html>
