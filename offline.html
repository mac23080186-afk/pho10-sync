<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phở 10 – Mất kết nối</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #D62828;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #FEE2E2;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 {
      color: #1a1a1a;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 10px;
    }
    p {
      color: #6b7280;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    button {
      background: #D62828;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #B71C1C; }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- Wifi-off icon (inline SVG — no CDN needed offline) -->
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
           fill="none" stroke="#D62828" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Mất kết nối mạng</h1>
    <p>
      Phở 10 Sync cần kết nối internet để đồng bộ đơn hàng qua Firebase.<br>
      Vui lòng kiểm tra Wi-Fi hoặc dữ liệu di động rồi thử lại.
    </p>
    <button onclick="location.reload()">Thử lại</button>
  </div>
</body>
</html>
